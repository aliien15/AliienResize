# =======================================================
# AliienResize - Messages
# =======================================================

# Used to store the plugin data
database:
  # Valid types: NONE, MYSQL, MARIADB
  #
  # MYSQL or MARIADB are only needed if you want to sync the player's size through multiple servers,
  # otherwise I recommend leaving it at NONE
  #
  # NONE just stores the data directly into the player - it doesn't require any additional setup
  type: NONE
  # If you are not using MySQL or MariaDB this section is completely irrelevant
  settings:
    host: "localhost"
    port: 3306
    database: "server"
    username: "root"
    password: "password"
    advanced:
      max-pool-size: 10
      min-idle: 10
      connection-timeout: 10000
      max-lifetime: 1800000

# Should the plugin check/notify for new updates?
# Requires a reboot
check-for-updates: true

# Toggle the hooks
hooks:
  placeholder-api:
    enabled: true
    default-values:
      format: ""
  vault: # Keep this enabled if you are using the economy feature, even if you aren't using vault as a currency
    enabled: true
    suffix: "$"
  experience: # This isn't a plugin, but by disabling this you avoid it being saved as a purchase option for no reason
    enabled: false
    suffix: "Experience"
  player-points:
    enabled: false
    suffix: "Points"
  ax-quest-board:
    enabled: false
    suffix: "Quest Points"
  # Multi-currency plugins:
  # - Add each currency name/id you want to use under "currencies".
  # - In color prices, use the plugin prefix + currency name/id. Example: "COINSENGINE_gems".
  # - The %suffix% placeholder uses currency-suffixes.<currency> when set.
  # - If no suffix is set for a currency, %suffix% falls back to the raw currency name/id.
  # Example:
  #   currencies: [gems]
  #   currency-suffixes:
  #     gems: " Gems"
  ultra-economy:
    enabled: false
    currencies: []
    currency-suffixes: {}
  coins-engine: # Legacy version of ExcellentEconomy, may not work correctly on newer minecraft versions
    enabled: false
    currencies: []
    currency-suffixes: {}
  excellent-economy:
    enabled: false
    currencies: []
    currency-suffixes: {}
  eco-bits:
    enabled: false
    currencies: []
    currency-suffixes: {}
  royale-economy:
    enabled: false
    suffix: "RoyaleEco"
  redis-economy:
    enabled: false
    currencies: []
    currency-suffixes: {}
  # Here you can set your own custom currency, even if it is not officially supported
  # Requires PlaceholderAPI
  custom-economy:
    enabled: false
    currencies:
      vote_tokens: # Custom currency example
        balance-placeholder: "%vote_balance%" # This has to be an unformatted placeholder (just the raw number)
        withdraw-command: "vote take %player% %amount%" # This has to be a command (use %player% and %amount% placeholders)
        suffix: "Vote Tokens"

# Toggle the confirmation menu for purchases
# I recommend leaving this enabled if you don't wanna hear complaints from your players misclicking everything
confirmation-menu:
  enabled: true

# Blacklisted worlds, where players will have to have the
# default player size/scale (1.0)
blacklisted-worlds:
  - "example-world"

# Sounds settings
sounds:
  # If you set this to false you can ignore everything else in this sounds section
  enabled: true

  # Format: "sound_name:volume:pitch"
  # You can use "NONE" if you want to disable a specific sound
  # You can use Vanilla sounds or Custom Resource Pack sounds natively!

  click: "UI_BUTTON_CLICK:1.0:1.0"
  success: "ENTITY_PLAYER_LEVELUP:1.0:1.0"
  error: "ENTITY_VILLAGER_NO:1.0:1.0"
  clear: "ENTITY_EXPERIENCE_ORB_PICKUP:1.0:0.5"

# Logs successful purchases into a .txt file inside the plugin folder
purchase-logging:
  enabled: true
  file-name: "logs.txt"

# DO NOT under any circumstance touch this unless you are told to by the official support
config-version: 3