# =======================================================
# AliienResize - Confirmation Menu
# =======================================================
menu-settings:
  title: "<dark_gray>Confirm Purchase?</dark_gray>"
  rows: 3
  # The item that represents the size that the player is purchasing will be displayed here
  # The items displayed in this/these slots are exactly the same as to what is defined in sizes.yml
  display-slots: [13]

items:
  confirm:
    action: "CONFIRM"
    material: LIME_STAINED_GLASS_PANE
    name: "<green><bold>✔ Confirm Purchase</bold></green>"
    slots: [ 10, 11, 12 ]
    lore:
      - "<gray>Cost: <gold>%price%</gold></gray>"
      - ""
      - "<green>Click to finalize your transaction!</green>"
    model-data: 0
    item-flags: []

  cancel:
    action: "CANCEL"
    material: RED_STAINED_GLASS_PANE
    name: "<red><bold>✖ Cancel</bold></red>"
    slots: [ 14, 15, 16 ]
    lore:
      - "<red>Click to abort and go back.</red>"
    model-data: 0
    item-flags: []

  filler_black:
    action: "NONE"
    material: BLACK_STAINED_GLASS_PANE
    name: " "
    slots: [ 0, 1, 2, 6, 7, 8, 9, 17, 18, 19, 20, 24, 25, 26 ]
    lore: []
    model-data: 0
    item-flags: []

  filler_gray:
    action: "NONE"
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    slots: [ 3, 4, 5, 21, 22, 23 ]
    lore: []
    model-data: 0
    item-flags: []

# DO NOT under any circumstance touch this unless you are told to by the official support
config-version: 1